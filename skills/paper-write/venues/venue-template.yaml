# Venue preset template — copy this file to venues/<your_venue>.yaml and fill in.
# Schema is validated by SKILL.md at Stage 0. Unknown keys cause an error.

# ─── 식별 ─────────────────────────────
name: "Venue Display Name"           # human-readable
key: venue_key                       # CLI key, must match filename (without .yaml)

# ─── LaTeX 빌드 ───────────────────────
class: ieeeconf                      # \documentclass{X}
class_options: []                    # list of options inside [...]
template_dir: ${WORKSPACE_TEMPLATE_DIR}/ieee_conference  # env var; resolved per SKILL.md Stage 0
bib_style: IEEEtran
compile_engine: pdflatex             # pdflatex | xelatex | lualatex
extra_packages:
  - graphicx
  - amsmath

# ─── 분량 제한 ────────────────────────
page_limit: 6                        # null = unlimited
page_hard_limit: 8                   # over → critical finding
abstract_words: 150                  # ±20% allowed
title_max_words: 20

# ─── 섹션 구조 ────────────────────────
sections:
  - Introduction
  - Related Work
  - Methodology
  - Experiments
  - Conclusion
section_aliases:
  방법론: Methodology
  실험: Experiments
required_sections:
  - Introduction
  - Methodology
  - Experiments

# ─── 리뷰 가중치 ──────────────────────
review_weights:
  logic: 1.0
  prose: 1.0
  figure: 1.0
  citation: 1.0
  lint: 1.0
quality_threshold: 80                # weighted score must >=
max_review_rounds: 5                 # critic-fixer loop cap
regression_threshold: 5              # if score drops > this between rounds, abort loop

# ─── 인용 정책 ────────────────────────
min_citations: 15
self_citation_max_ratio: 0.20

# ─── 제출 패키지 (allowed: source_zip, cover_letter, response_letter, format_checklist) ──
extras:
  - source_zip
  - format_checklist

# ─── 체크포인트 on/off ────────────────
checkpoints:
  outline_required: true
  korean_review_required: true
  submission_confirm: true
