# POSTECH M.Sc. Thesis venue preset
# Validated 2026-05-11 against venue-template.yaml schema.
# Reference: HEROlab 표준 (박건우 v18 / 노세환 v5 / 송석용 v7 양식 분석 기반)
#
# Differs from iros.yaml in:
#   - class: report (vs ieeeconf), bib_style: plainnat
#   - page_limit: null (학위논문은 분량 제한 없음 — front matter, appendix 포함 시 100p+)
#   - abstract_words: 500 (학위논문 abstract는 conference보다 김)
#   - sections: 5 chapters with thesis-specific labels
#   - review_weights: prose 1.2, logic 1.0 (학위논문은 prose 비중 ↑)
#   - extras: format_checklist만 (cover_letter / response_letter 불필요)
#   - min_citations: 50 (학위논문 기준)

# ─── 식별 ─────────────────────────────
name: "POSTECH M.Sc. Thesis (HEROlab)"
key: postech_msc_thesis

# ─── LaTeX 빌드 ───────────────────────
class: report
class_options:
  - oneside
  - 11pt
  - a4paper
template_dir: ${WORKSPACE_TEMPLATE_DIR}/postech_thesis  # 없으면 표준 report 사용
bib_style: plainnat
compile_engine: pdflatex
extra_packages:
  - graphicx
  - amsmath
  - amssymb
  - algorithm
  - algorithmic
  - booktabs
  - subcaption
  - hyperref
  - natbib
  - kotex                # 한국어 (POSTECH 표지 한국어 병기)

# ─── 분량 제한 ────────────────────────
# 학위논문은 분량 제한 없음 — null로 명시 (orchestrator format_checklist는 null이면 항목 skip)
page_limit: null
page_hard_limit: null
abstract_words: 500      # 학위논문 abstract는 conference (150) 대비 길게
title_max_words: 30      # 학위논문 제목은 더 길어질 수 있음

# ─── 섹션 구조 ────────────────────────
# 본인 디펜스 자료 (defense_2026.md) 기준 5 chapter 구조
sections:
  - Introduction
  - Sonar-Based Cooperative Localization
  - Adaptive Learning Boundary Control (RL-ALBC)
  - System Integration
  - Conclusion
section_aliases:
  서론: Introduction
  소나기반협조위치추정: Sonar-Based Cooperative Localization
  학습기반경계제어: Adaptive Learning Boundary Control (RL-ALBC)
  시스템통합: System Integration
  결론: Conclusion
required_sections:
  - Introduction
  - Conclusion           # 학위논문은 Intro/Conclusion만 hard required, 본문 chapter는 프로젝트별

# ─── 리뷰 가중치 ──────────────────────
# Thesis는 prose (논리 흐름의 문체)와 logic (논증 구조) 둘 다 중요.
# Conference 대비 prose 가중치 ↑ (0.8 → 1.2), figure 가중치 ↓ (1.0 → 0.8)
# Thesis는 figure보다 글의 흐름과 논리적 완결성이 더 중요
review_weights:
  logic: 1.2
  prose: 1.2
  figure: 0.8
  citation: 1.0
  lint: 0.6
quality_threshold: 80
max_review_rounds: 5
regression_threshold: 5

# ─── 인용 정책 ────────────────────────
min_citations: 50              # 학위논문 (석사) 평균 50~100건
self_citation_max_ratio: 0.30  # 본인 paper (IROS/RA-L/Access/IJCAS 4편 + KMRTS) 인용 가능 폭 ↑

# ─── 제출 패키지 ──────────────────────
# Cover letter / response letter 불필요 (학위논문은 reviewer-author 왕복 없음)
extras:
  - format_checklist

# ─── 체크포인트 on/off ────────────────
# Thesis는 outline 단계가 더 중요 (chapter 구성에 지도교수 승인 필요)
checkpoints:
  outline_required: true
  korean_review_required: true
  submission_confirm: true
