name: "IROS (IEEE/RSJ International Conference on Intelligent Robots and Systems)"
key: iros

class: ieeeconf
class_options:
  - letterpaper
  - "10 pt"
  - conference
template_dir: 3_Archive/etc/templates/ieee_conference
bib_style: IEEEtran
compile_engine: pdflatex
extra_packages:
  - graphicx
  - amsmath
  - amssymb
  - algorithm
  - algorithmic
  - booktabs
  - cite
  - subcaption

page_limit: 6
page_hard_limit: 8
abstract_words: 150
title_max_words: 20

sections:
  - Introduction
  - Related Work
  - Methodology
  - Experiments
  - Conclusion
section_aliases:
  방법론: Methodology
  실험: Experiments
  관련연구: Related Work
  서론: Introduction
  결론: Conclusion
required_sections:
  - Introduction
  - Methodology
  - Experiments

# Conference 가중치: figure/logic 우선, prose 약간 하향
review_weights:
  logic: 1.0
  prose: 0.8
  figure: 1.0
  citation: 1.0
  lint: 0.6
quality_threshold: 80
max_review_rounds: 5
# critic-fixer 루프 회귀 임계값: round N 점수가 round N-1 점수보다 이만큼 떨어지면 즉시 종료
regression_threshold: 5

min_citations: 15
self_citation_max_ratio: 0.20

extras:
  - source_zip
  - format_checklist

checkpoints:
  outline_required: true
  korean_review_required: true
  submission_confirm: true
