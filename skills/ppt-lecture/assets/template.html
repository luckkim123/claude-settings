<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[필수] 슬라이드 제목 · Lecture Deck</title>

  <!-- Pretendard (Mac brew + Win winget로 시스템 설치) — fallback to Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ==================== THEME TOKENS ==================== */
    /* light: 강의실 프로젝터 / 흰 배경 */
    :root[data-theme="light"] {
      --bg:        #FAFAFA;
      --bg-sub:   #F0F0F0;
      --fg:        #1A1A1A;
      --fg-sub:   #4A4A4A;
      --accent:    #2C3E50;
      --accent-lt: #3498DB;
      --muted:     #6C757D;
      --border:    #E0E0E0;
    }

    /* dark: 블로그 임베드 / Twitter 공유 */
    :root[data-theme="dark"] {
      --bg:        #0F1419;
      --bg-sub:   #1A2027;
      --fg:        #E8E8E8;
      --fg-sub:   #B8B8B8;
      --accent:    #61DAFB;
      --accent-lt: #FFA657;
      --muted:     #8B949E;
      --border:    #30363D;
    }

    /* paper: 출력 / 종이 질감 */
    :root[data-theme="paper"] {
      --bg:        #F5F1E8;
      --bg-sub:   #EAE2D0;
      --fg:        #2C2418;
      --fg-sub:   #5A4F40;
      --accent:    #8B4513;
      --accent-lt: #C25E3C;
      --muted:     #6B5D4F;
      --border:    #D4C9B0;
    }

    /* ==================== TYPOGRAPHY ==================== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: "Pretendard", "Pretendard Variable", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .meta-mono {
      font-family: "JetBrains Mono", "SF Mono", Consolas, monospace;
    }

    /* ==================== SLIDE CONTAINER ==================== */
    .deck {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 48px 24px;
      max-width: 100%;
    }

    /* 16:9 ratio: 1920×1080 (= 100% × 56.25%) */
    .slide {
      width: min(1920px, calc(100vw - 48px));
      aspect-ratio: 16 / 9;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 64px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* Slide-internal scale: vw → relative */
    .slide h1 { font-size: 4.5vw; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
    .slide h2 { font-size: 2.8vw; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; color: var(--accent); }
    .slide h3 { font-size: 2.0vw; font-weight: 600; line-height: 1.3; }
    .slide p,
    .slide li { font-size: 1.5vw; line-height: 1.6; color: var(--fg-sub); }
    .slide .meta { font-size: 1.0vw; color: var(--muted); }
    .slide .stat-num { font-size: 12vw; font-weight: 900; line-height: 1; color: var(--accent); }
    .slide .stat-label { font-size: 1.8vw; color: var(--fg-sub); }

    /* ==================== LAYOUT 1: hero-cover ==================== */
    .layout-hero-cover {
      justify-content: center;
      align-items: flex-start;
      gap: 24px;
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg-sub) 100%);
    }
    .layout-hero-cover .meta-row { display: flex; gap: 24px; margin-bottom: 16px; }

    /* ==================== LAYOUT 2: flow-3step ==================== */
    .layout-flow-3step { gap: 24px; }
    .layout-flow-3step .flow-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto 1fr;
      align-items: center;
      gap: 24px;
      flex: 1;
    }
    .layout-flow-3step .flow-arrow {
      font-size: 4vw; color: var(--muted);
    }
    .layout-flow-3step .flow-step {
      background: var(--bg-sub);
      border: 1px solid var(--border);
      padding: 32px;
      border-radius: 16px;
      text-align: center;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
    }
    .layout-flow-3step .flow-step .step-num {
      font-size: 1vw; color: var(--accent); font-weight: 700;
    }
    .layout-flow-3step .flow-step .step-title {
      font-size: 2.2vw; font-weight: 700;
    }

    /* ==================== LAYOUT 3: side-by-side ==================== */
    .layout-side-by-side .compare-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 32px;
      flex: 1;
      align-items: stretch;
    }
    .layout-side-by-side .compare-col {
      background: var(--bg-sub);
      border: 1px solid var(--border);
      padding: 32px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .layout-side-by-side .compare-divider {
      display: flex; align-items: center; justify-content: center;
      font-size: 3vw; color: var(--muted); font-weight: 800;
    }

    /* ==================== LAYOUT 4-5: bento-2x2 / bento-3x2 ==================== */
    .layout-bento-2x2 .bento-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 24px;
      flex: 1;
    }
    .layout-bento-3x2 .bento-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 24px;
      flex: 1;
    }
    .bento-cell {
      background: var(--bg-sub);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .bento-cell .cell-num {
      font-size: 0.9vw; color: var(--accent); font-weight: 700;
    }
    .bento-cell .cell-title {
      font-size: 1.6vw; font-weight: 700;
    }

    /* ==================== LAYOUT 6: timeline-h ==================== */
    .layout-timeline-h .timeline-grid {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      gap: 16px;
      flex: 1;
      align-items: stretch;
    }
    .timeline-step {
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
    }
    .timeline-step::before {
      content: ""; position: absolute;
      top: 8px; left: -8px; right: -8px;
      border-top: 2px dashed var(--border);
      z-index: 0;
    }
    .timeline-step .timeline-dot {
      width: 16px; height: 16px;
      background: var(--accent);
      border-radius: 50%;
      position: relative; z-index: 1;
    }

    /* ==================== LAYOUT 7: callout-stat ==================== */
    .layout-callout-stat {
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 24px;
    }

    /* ==================== LAYOUT 8: takeaway ==================== */
    .layout-takeaway .takeaway-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
      flex: 1;
      justify-content: center;
    }
    .takeaway-item {
      display: flex; gap: 24px; align-items: baseline;
    }
    .takeaway-item .takeaway-num {
      font-size: 3vw; font-weight: 800; color: var(--accent);
      min-width: 60px;
    }
    .takeaway-item .takeaway-text {
      font-size: 2vw; font-weight: 600;
    }

    /* ==================== LAYOUT 9 (extra): quote-large ==================== */
    .layout-quote-large {
      justify-content: center; align-items: flex-start;
      padding: 96px;
    }
    .quote-mark { font-size: 8vw; color: var(--accent); line-height: 0.5; font-family: serif; }
    .quote-body { font-size: 3vw; font-weight: 600; line-height: 1.4; }
    .quote-author { font-size: 1.2vw; color: var(--muted); margin-top: 24px; }

    /* ==================== HEADER / FOOTER (slide-internal) ==================== */
    .slide-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .slide-header .deck-title {
      font-size: 0.9vw; color: var(--muted); font-weight: 600;
    }
    .slide-header .page-num {
      font-size: 0.9vw; color: var(--muted);
    }
    .slide-footer {
      margin-top: auto;
      display: flex; justify-content: space-between; align-items: baseline;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 0.85vw;
      color: var(--muted);
    }

    /* ==================== TOP-RIGHT TOOLBAR (download) ==================== */
    .toolbar {
      position: fixed;
      top: 16px; right: 16px;
      display: flex; gap: 8px;
      z-index: 1000;
    }
    .toolbar button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: opacity 0.2s;
    }
    .toolbar button:hover { opacity: 0.85; }
    .toolbar button:active { opacity: 0.7; }

    /* ==================== PRINT (PDF export) ==================== */
    @media print {
      body { background: white; }
      .deck { padding: 0; gap: 0; }
      .slide {
        box-shadow: none;
        border: none;
        page-break-after: always;
        max-width: 100%;
        width: 100%;
      }
      .toolbar { display: none; }
    }
  </style>
</head>
<body>
  <!-- Top-right toolbar: ZIP all + individual PNG -->
  <div class="toolbar">
    <button id="btn-zip">📦 Download ZIP</button>
    <button id="btn-png">🖼 Save PNG</button>
  </div>

  <main class="deck" id="deck">

    <!-- ============== EXAMPLE SLIDE 1: hero-cover ============== -->
    <section class="slide layout-hero-cover" data-slide-id="1">
      <div class="slide-header">
        <div class="deck-title">[필수] Deck Title</div>
        <div class="page-num meta-mono">01 / 07</div>
      </div>

      <div class="meta-row meta-mono">
        <span class="meta">[필수] CATEGORY</span>
        <span class="meta">2026-MM-DD</span>
      </div>

      <h1>[필수] 슬라이드 메인 제목</h1>
      <h2 style="margin-top: 24px;">[선택] 부제 또는 한 줄 요약</h2>

      <div class="slide-footer">
        <div>[필수] 발표자 이름</div>
        <div>[필수] 소속 / 강의명</div>
      </div>
    </section>

    <!-- ============== EXAMPLE SLIDE 2: takeaway (마무리 예시) ============== -->
    <section class="slide layout-takeaway" data-slide-id="2">
      <div class="slide-header">
        <div class="deck-title">[필수] Deck Title</div>
        <div class="page-num meta-mono">07 / 07</div>
      </div>

      <h2>핵심 정리</h2>

      <div class="takeaway-list">
        <div class="takeaway-item">
          <div class="takeaway-num">01</div>
          <div class="takeaway-text">[필수] 첫 번째 takeaway</div>
        </div>
        <div class="takeaway-item">
          <div class="takeaway-num">02</div>
          <div class="takeaway-text">[필수] 두 번째 takeaway</div>
        </div>
        <div class="takeaway-item">
          <div class="takeaway-num">03</div>
          <div class="takeaway-text">[필수] 세 번째 takeaway</div>
        </div>
      </div>

      <div class="slide-footer">
        <div>다음 강의: [선택]</div>
        <div>질문은 [선택] 으로</div>
      </div>
    </section>

  </main>

  <!-- ==================== JS: html2canvas + jszip via CDN ==================== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <script>
    // Wait for fonts before capture (한글 깨짐 방지)
    async function captureSlide(slideEl) {
      await document.fonts.ready;
      const canvas = await html2canvas(slideEl, {
        scale: 2,           // 2x DPI for retina
        useCORS: true,
        backgroundColor: getComputedStyle(document.documentElement)
          .getPropertyValue('--bg').trim(),
      });
      return canvas;
    }

    // Save single PNG (currently visible slide — first one)
    document.getElementById('btn-png').addEventListener('click', async () => {
      const slides = document.querySelectorAll('.slide');
      if (slides.length === 0) return;
      const canvas = await captureSlide(slides[0]);
      canvas.toBlob(blob => saveAs(blob, 'slide-01.png'));
    });

    // Save all slides as ZIP
    document.getElementById('btn-zip').addEventListener('click', async () => {
      const btn = document.getElementById('btn-zip');
      const original = btn.textContent;
      btn.textContent = '⏳ Capturing...';
      btn.disabled = true;

      try {
        const zip = new JSZip();
        const slides = document.querySelectorAll('.slide');
        for (let i = 0; i < slides.length; i++) {
          btn.textContent = `⏳ ${i+1} / ${slides.length}`;
          const canvas = await captureSlide(slides[i]);
          const blob = await new Promise(r => canvas.toBlob(r));
          const idx = String(i + 1).padStart(2, '0');
          zip.file(`slide-${idx}.png`, blob);
        }
        const zipBlob = await zip.generateAsync({ type: 'blob' });
        const title = document.querySelector('.deck-title')?.textContent || 'deck';
        const slug = title.replace(/[^a-zA-Z0-9가-힣]+/g, '-').toLowerCase();
        saveAs(zipBlob, `${slug}-slides.zip`);
      } catch (err) {
        console.error(err);
        alert('캡처 중 오류: ' + err.message);
      } finally {
        btn.textContent = original;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
