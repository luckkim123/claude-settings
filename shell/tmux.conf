# ============================================
# Prefix Key: Ctrl+a
# ============================================
set-option -g prefix C-a
unbind C-b
bind C-a send-prefix

# ============================================
# Pane Splitting
# ============================================
unbind %
unbind '"'
bind o split-window -v -c "#{pane_current_path}"    # 수직 분할 (위/아래) — 현재 디렉터리 유지
bind e split-window -h -c "#{pane_current_path}"    # 수평 분할 (좌/우)   — 현재 디렉터리 유지

# ============================================
# Window Management
# ============================================
unbind c
unbind t
unbind w
bind t new-window -c "#{pane_current_path}"  # 새 창 생성 — 현재 디렉터리 유지
bind w if-shell '[ "$(tmux display-message -p "#{window_panes}")" -eq 1 ]' 'kill-window' 'kill-pane'

# 설정 reload
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
bind W choose-tree                       # 트리 뷰
bind n command-prompt -I "#W" "rename-window '%%'"  # 윈도우 이름 변경
bind [ previous-window                   # 이전 윈도우
bind ] next-window                       # 다음 윈도우

# ============================================
# Pane Sync & Clock
# ============================================
bind s setw synchronize-panes \; display-message "Sync Panes: #{?pane_synchronized,on,off}"
bind T clock-mode

# ============================================
# Cross-platform Clipboard (macOS / Linux)
# ============================================
# pbcopy/pbpaste on macOS, xclip on Linux. Exposed as env vars so binding strings
# below stay short. Bindings reference $COPY_CMD / $PASTE_CMD at execution time
# (tmux spawns /bin/sh -c "...", which inherits the global environment).
set-environment -g COPY_CMD  'command -v pbcopy >/dev/null 2>&1 && pbcopy || xclip -selection clipboard -i'
set-environment -g PASTE_CMD 'command -v pbpaste >/dev/null 2>&1 && pbpaste || xclip -selection clipboard -o'

# ============================================
# Mouse & Scroll
# ============================================
set -g mouse on
bind -T copy-mode-vi WheelUpPane   send-keys -X -N 2 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 2 scroll-down

# 드래그 선택 → 클립보드 복사
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel '$COPY_CMD'

# 더블클릭: 단어 선택 + 복사
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel '$COPY_CMD'
bind-key -T root DoubleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H; send-keys -X select-word; run-shell -d 0.3; send-keys -X copy-pipe-and-cancel '$COPY_CMD' }

# 트리플클릭: 줄 선택 + 복사
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel '$COPY_CMD'
bind-key -T root TripleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H; send-keys -X select-line; run-shell -d 0.3; send-keys -X copy-pipe-and-cancel '$COPY_CMD' }

# 중간/우클릭: 붙여넣기
bind-key -T root MouseDown2Pane run '($PASTE_CMD) | tmux load-buffer - && tmux paste-buffer'
bind-key -T root MouseDown3Pane run '($PASTE_CMD) | tmux load-buffer - && tmux paste-buffer'

# ============================================
# Copy Mode (vi style)
# ============================================
set -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel '$COPY_CMD'
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel '$COPY_CMD'
bind P paste-buffer

# ============================================
# Appearance & General
# ============================================
set -g pane-border-status top
set -g status-right "#S | %Y-%m-%d %H:%M:%S"
set -g detach-on-destroy off
set -g renumber-windows on                          # 창 닫을 때 번호 자동 재정렬
if-shell 'test "$(uname)" = "Darwin"' \
    'set-option -g default-shell /bin/zsh' \
    'set-option -g default-shell /bin/bash'
set -g default-terminal "tmux-256color"             # screen-256color는 레거시 — italic·strikethrough 지원
set -ga terminal-overrides ",*256col*:Tc"           # 24-bit true color (모든 256색 터미널 대상)

# Silence macOS bash deprecation warning ("default interactive shell is now zsh")
set-environment -g BASH_SILENCE_DEPRECATION_WARNING 1

# OSC52 — let tmux push selections to the host terminal's clipboard too (iTerm2/Alacritty/Kitty 등)
set -g set-clipboard on

# ============================================
# Performance & TUI Behavior
# ============================================
# Forward terminal focus events to inner programs (vim FocusGained, Claude Code, etc.)
set -g focus-events on

# Reduce ESC key delay (default 500ms is a legacy slow-modem default that breaks vim/TUI feel)
set -sg escape-time 10

# Refresh status bar every 1s so the seconds field in status-right ('%H:%M:%S') actually ticks
set -g status-interval 1

# Larger scrollback so long build logs / training output isn't truncated
set -g history-limit 50000
